<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSNBA Reporting – User Accounts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sora:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin.css" />
    <link rel="stylesheet" href="/admin-pages.css" />
    <style>
      .report-top-nav { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
      .report-nav-btn {
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.14);
        color: var(--muted);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        font-size: 0.82rem;
      }
      .report-nav-btn.is-active,
      .report-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
      .staff-user-row {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 0.65rem;
        align-items: start;
      }
      .staff-avatar {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        background: rgba(245,166,35,0.18);
        color: var(--accent);
        font: 700 0.88rem/2rem "Sora", sans-serif;
        text-align: center;
      }
      .staff-user-meta { min-width: 0; }
      .staff-user-name { font: 600 0.92rem/1.2 "Outfit", sans-serif; }
      .staff-user-email { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; word-break: break-all; }
      .staff-user-groups { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
      .staff-limit-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.45rem; }
      .staff-limit-row input { width: 5rem; }
      .staff-perm-editor {
        margin-top: 0.5rem;
        padding: 0.55rem;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        background: rgba(255,255,255,0.02);
      }
      .staff-perm-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.35rem 0.7rem;
      }
      .staff-perm-check { display: flex; align-items: center; gap: 0.38rem; font-size: 0.82rem; color: var(--muted); }
      .staff-perm-actions { display: flex; gap: 0.45rem; margin-top: 0.55rem; }
      .staff-actions { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <a class="top-brand" href="/admin-reporting.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">HSNBA Reporting</span>
      </a>
      <nav class="report-top-nav" aria-label="Reporting navigation">
        <a class="report-nav-btn" href="/admin-reporting.html">Dashboard</a>
        <a class="report-nav-btn" href="/admin-shelter-reports.html">Shelter Reports</a>
        <a class="report-nav-btn" href="/admin-animal-control.html">Animal Control</a>
        <a class="report-nav-btn" href="/admin-reporting-account.html">My Account</a>
        <a class="report-nav-btn is-active" href="/admin-reporting-users.html">User Accounts</a>
      </nav>
      <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
    </header>

    <main class="page-shell wrap">
      <section class="card settings-card">
        <div class="card-label">SETTINGS</div>

        <div class="setting-row stack">
          <div>
            <div class="setting-name">Create User Account</div>
            <div class="setting-desc">Create an account with groups and request limit, then send a secure invite email.</div>
          </div>
          <div class="setting-form-grid">
            <input id="staffDisplayNameInput" type="text" maxlength="60" placeholder="Display name" />
            <input id="staffUsernameInput" type="email" autocomplete="off" placeholder="Email address" />
            <input id="staffLimitInput" type="number" min="1" step="1" placeholder="Daily song request limit (default: 5)" />
          </div>
          <div class="setting-form-row" style="gap:1.2rem;margin-top:0.2rem;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem"><input id="staffGroupUser" type="checkbox" /> User</label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem"><input id="staffGroupJukeboxAdmin" type="checkbox" /> Jukebox admin</label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem"><input id="staffGroupReporting" type="checkbox" checked /> Reporting</label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem"><input id="staffGroupSuperadmin" type="checkbox" /> Superadmin</label>
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.88rem"><input id="staffGroupGlobalAdmin" type="checkbox" /> Global admin</label>
          </div>
          <div class="setting-form-actions">
            <button id="createStaffBtn" class="btn-sm" type="button">Create + Send Invite</button>
          </div>
        </div>

        <div class="setting-row stack">
          <div>
            <div class="setting-name">User Accounts</div>
            <div id="staffStatusText" class="setting-desc">Loading User Accounts...</div>
          </div>
          <ul id="staffList" class="req-list"></ul>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script type="module" src="/admin-reporting-users.js"></script>
  </body>
</html>
