<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSNBA Animal Control Heat Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sora:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin.css" />
    <link rel="stylesheet" href="/admin-pages.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      .page-shell { width: min(1180px, 96vw); margin: 1rem auto 2rem; display: grid; gap: 0.9rem; }
      .head-row { display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }
      .head-row h1 { margin: 0; font: 700 1.45rem/1.2 "Sora", sans-serif; }
      .head-row p { margin: 0.25rem 0 0; color: var(--muted); }
      .report-top-nav { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
      .report-nav-btn {
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.14);
        color: var(--muted);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        font-size: 0.82rem;
      }
      .report-nav-btn.is-active,
      .report-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
      .btn-primary {
        border: 0;
        border-radius: 9px;
        background: linear-gradient(140deg, var(--accent), var(--accent-d));
        color: #fff;
        padding: 0.55rem 0.9rem;
        font: 600 0.9rem/1 "Outfit", sans-serif;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .filters { display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: end; }
      .filters label { font-size: 0.82rem; color: var(--muted); display: grid; gap: 0.2rem; }
      .filters input {
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: #dceaf5;
        padding: 0.35rem 0.5rem;
        font: 500 0.9rem/1 "Outfit", sans-serif;
      }
      .display-options-panel {
        margin-top: 0.6rem;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 0.7rem;
        background: rgba(255,255,255,0.03);
      }
      .display-options-panel[hidden] { display: none; }
      .display-options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.6rem 0.8rem;
      }
      .display-options-grid label {
        display: grid;
        gap: 0.25rem;
        color: var(--muted);
        font-size: 0.82rem;
      }
      .display-options-grid input,
      .display-options-grid select {
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        color: #dceaf5;
        padding: 0.35rem 0.5rem;
        font: 500 0.9rem/1 "Outfit", sans-serif;
      }
      .display-options-grid input[type="color"] {
        width: 100%;
        min-height: 2.2rem;
        padding: 0.2rem;
      }
      .display-options-grid label.inline-toggle {
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }
      .district-color-controls {
        margin-top: 0.75rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.55rem 0.75rem;
      }
      .district-color-control {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 0.45rem;
        background: rgba(255,255,255,0.02);
        display: grid;
        gap: 0.25rem;
      }
      .district-color-control span {
        color: var(--muted);
        font-size: 0.8rem;
      }
      .display-options-actions {
        margin-top: 0.7rem;
        display: flex;
        justify-content: flex-end;
      }
      #acHeatMap { height: min(68vh, 700px); border-radius: 10px; overflow: hidden; }
      .meta { color: var(--muted); font-size: 0.86rem; }
      .table-wrap { overflow-x: auto; }
      .data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      .data-table th { color: var(--muted); font-weight: 600; text-align: left; padding: 0.35rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .data-table td { padding: 0.3rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
      .data-table tr:last-child td { border-bottom: 0; }
      .data-table td:nth-child(1), .data-table td:nth-child(2) { text-align: right; font-variant-numeric: tabular-nums; }
      @media (max-width: 760px) {
        .head-row { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <a class="top-brand" href="/admin-reporting.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">HSNBA Reporting</span>
      </a>
      <nav class="report-top-nav" aria-label="Reporting navigation">
        <a class="report-nav-btn" href="/admin-reporting.html">Dashboard</a>
        <a class="report-nav-btn" href="/admin-shelter-reports.html">Shelter Reports</a>
        <a class="report-nav-btn" href="/admin-gis-reports.html">GIS Reports</a>
        <a class="report-nav-btn is-active" href="/admin-animal-control.html">Animal Control</a>
        <a class="report-nav-btn" href="/admin-reporting-account.html">My Account</a>
        <a class="report-nav-btn" href="/admin-reporting-users.html">User Accounts</a>
      </nav>
      <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
    </header>

    <main class="page-shell wrap">
      <section class="card head-row">
        <div>
          <h1>Animal Control Heat Map</h1>
          <p>Heat intensity is based on call count at mapped dispatch addresses.</p>
        </div>
        <a class="btn-primary" href="/admin-animal-control.html">Back To Animal Control</a>
      </section>

      <section class="card">
        <div class="filters" aria-label="Heat map filters">
          <label>From Date
            <input id="fromDate" type="date" />
          </label>
          <label>To Date
            <input id="toDate" type="date" />
          </label>
          <button id="runBtn" class="btn-primary" type="button">Refresh Heat Map</button>
          <label style="display:flex;align-items:center;gap:0.45rem">
            <input id="districtOverlayToggle" type="checkbox" checked />
            <span>Show City Council Districts</span>
          </label>
          <button id="displayOptionsToggle" class="btn-ghost" type="button" aria-expanded="false" aria-controls="displayOptionsPanel">Display Options</button>
        </div>
        <div id="displayOptionsPanel" class="display-options-panel" hidden>
          <div class="display-options-grid" aria-label="Display options">
            <label>Hotspot Border Color
              <input id="hotspotBorderColor" type="color" value="#f5a623" />
            </label>
            <label>Hotspot Fill Color
              <input id="hotspotFillColor" type="color" value="#f06a6a" />
            </label>
            <label>District Title Field
              <select id="districtTitleField">
                <option value="auto">Auto</option>
                <option value="District">District</option>
                <option value="Rep_Name">Rep_Name</option>
                <option value="TermExpiry">TermExpiry</option>
                <option value="CouncilEmail">CouncilEmail</option>
              </select>
            </label>
            <label class="inline-toggle">
              <input id="districtTitleToggle" type="checkbox" checked />
              <span>Show District Title</span>
            </label>
          </div>
          <div id="districtColorControls" class="district-color-controls" aria-label="District color controls"></div>
          <div class="display-options-grid" style="margin-top:0.7rem" aria-label="GIS upload options">
            <label>Replace District GIS File (.geojson)
              <input id="districtGeoJsonUpload" type="file" accept=".geojson,application/geo+json,application/json" />
            </label>
            <label style="justify-content:end">
              <span>&nbsp;</span>
              <button id="uploadDistrictGeoJsonBtn" class="btn-ghost" type="button">Upload GIS File</button>
            </label>
          </div>
          <div id="districtUploadMeta" class="meta" style="margin-top:0.45rem"></div>
          <div id="displayOptionsMeta" class="meta" style="margin-top:0.2rem"></div>
          <div class="display-options-actions">
            <button id="saveDisplayDefaultsBtn" class="btn-ghost" type="button">Save As Defaults</button>
            <button id="resetDisplayOptionsBtn" class="btn-ghost" type="button">Reset Display Options</button>
          </div>
        </div>
        <div id="metaText" class="meta" style="margin-top:0.55rem">Loading...</div>
        <div id="districtOverlayMeta" class="meta" style="margin-top:0.2rem"></div>
      </section>

      <section class="card">
        <div class="card-label" style="margin-bottom:0.55rem">HEAT MAP</div>
        <div id="acHeatMap" role="img" aria-label="Animal control call address heat map"></div>
      </section>

      <section class="card">
        <div class="card-label">TOP HOTSPOTS</div>
        <div id="hotspotsTable" class="table-wrap">
          <span style="color:var(--muted)">Loading...</span>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script type="module" src="/admin-animal-control-heatmap.js"></script>
  </body>
</html>
