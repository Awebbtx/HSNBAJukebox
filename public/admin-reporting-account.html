<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSNBA Reporting – My Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Sora:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/admin.css" />
    <link rel="stylesheet" href="/admin-pages.css" />
    <style>
      .report-top-nav { display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
      .report-nav-btn {
        text-decoration: none;
        border: 1px solid rgba(255,255,255,0.14);
        color: var(--muted);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        font-size: 0.82rem;
      }
      .report-nav-btn.is-active,
      .report-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
      .page-shell { width: min(640px, 95vw); margin: 1rem auto 2rem; display: grid; gap: 0.9rem; }
      .head h1 { margin: 0; font: 700 1.45rem/1.2 "Sora", sans-serif; }
      .head p { margin: 0.25rem 0 0; color: var(--muted); }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <a class="top-brand" href="/admin-reporting.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">HSNBA Reporting</span>
      </a>
      <nav class="report-top-nav" aria-label="Reporting navigation">
        <a class="report-nav-btn" href="/admin-reporting.html">Dashboard</a>
        <a class="report-nav-btn" href="/admin-shelter-reports.html">Shelter Reports</a>
        <a class="report-nav-btn" href="/admin-animal-control.html">Animal Control</a>
        <a class="report-nav-btn is-active" href="/admin-reporting-account.html">My Account</a>
        <a class="report-nav-btn" href="/admin-reporting-users.html">User Accounts</a>
      </nav>
      <button id="logoutBtn" class="btn-ghost" type="button">Logout</button>
    </header>

    <main class="page-shell wrap">
      <section class="card head">
        <h1>My Account</h1>
        <p id="accountStatusText">Loading profile…</p>
      </section>

      <section class="card">
        <div class="setting-row stack">
          <div>
            <div class="setting-name">Profile</div>
            <div class="setting-desc">Update your display name shown in the admin console.</div>
          </div>
          <div class="setting-form-grid">
            <input id="usernameInput" type="text" placeholder="Email" readonly />
            <input id="displayNameInput" type="text" maxlength="60" placeholder="Display name" />
          </div>
          <div class="setting-form-actions">
            <button id="saveProfileBtn" class="btn-sm" type="button">Save Profile</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="setting-row stack">
          <div>
            <div class="setting-name">Change Password</div>
            <div class="setting-desc">Use your current password to set a new one (8+ characters). You will be signed out after a successful change.</div>
          </div>
          <div class="setting-form-grid">
            <input id="currentPasswordInput" type="password" autocomplete="current-password" placeholder="Current password" />
            <input id="newPasswordInput" type="password" autocomplete="new-password" placeholder="New password (8+ chars)" />
          </div>
          <div class="setting-form-actions">
            <button id="savePasswordBtn" class="btn-sm" type="button">Change Password</button>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script type="module" src="/admin-reporting-account.js"></script>
  </body>
</html>
