# Optional Nginx additions for the employee request page.
# Place these locations inside your existing server { ... } block.

location = /requests {
    proxy_pass http://127.0.0.1:3000/requests;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /api/requests/ {
    proxy_pass http://127.0.0.1:3000/api/requests/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
